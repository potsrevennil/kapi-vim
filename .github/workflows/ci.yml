name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Same tools scripts/format and .pre-commit-config.yaml already use, run in
  # devShells.ci so this doesn't need the full LSP/language toolchain from
  # ./lsp.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/install-nix
      - shell: nix develop .#ci -c bash -e {0}
        run: |
          files=$(find . -name "*.nix")
          nixpkgs-fmt --check $files
          deadnix --fail --hidden -L .
          statix check .
          stylua --check .
          shfmt -d -s -i 2 -ci -fn .
          shellcheck --check-sourced --shell bash scripts/*
          taplo format --check .
          codespell .

  # Cheap eval-only pass across every declared system -- catches
  # syntax/option errors before the real builds/tests below spend runner
  # time.
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/install-nix
      - run: nix flake check --all-systems

  # Builds and headless-smoke-tests two things with one job definition:
  # packages.lite (nixd + lua-language-server + editor tooling, every
  # language toggle off) on both OSes, fast enough for every push/PR; and
  # packages.bundle with a couple of languages selected via $KAPI_VIM_LANGS
  # on Linux, confirming the env-var-driven selection mechanism actually
  # works end-to-end (not just that it evaluates). lite and bundle with no
  # languages selected are byte-identical packages, so --impure (needed for
  # bundle to read $KAPI_VIM_LANGS) is applied uniformly -- it's a no-op for
  # the lite entries, which never call builtins.getEnv.
  #
  # packages.default (the full, every-language experience) is intentionally
  # not built here -- that's slow (10+ minutes cold, no caching) and belongs
  # in a separate, less-frequent workflow, not this one.
  #
  # Restores every lazy.nvim plugin over the network to the exact commit
  # recorded in lazy-lock.json (mason is disabled for LSP servers, but
  # lazy.nvim itself still self-manages plugins this way -- see
  # lua/config/lazy.lua), so this exercises the same first-run experience a
  # new user gets, not a hermetic nix build -- but a reproducible one:
  # `:Lazy sync` fetches whatever's newest upstream and rewrites the
  # lockfile, making this job a moving target; `:Lazy restore` pins to the
  # committed lockfile instead (see lua/config/lazy.lua for why that lockfile
  # is actually reachable here). Then verifies startup is clean and the
  # expected LSP binaries for that entry's languages resolve on PATH (see
  # smoke-test.lua).
  #
  # shell,go specifically: both are small, common nixpkgs packages unlikely
  # to need a from-source build. python was tried first and timed out --
  # python-lsp-server's dependency chain pulls in python3.11-pydantic-core
  # (a Rust extension), which isn't covered by the aarch64-linux binary
  # cache and has to compile from source; python still works fine via
  # KAPI_VIM_LANGS for real use, this only changes what CI happens to verify.
  test:
    needs: flake-check
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lite (macos-14)
            runs-on: macos-14
            target: lite
            langs: ""
          - name: lite (ubuntu-24.04-arm)
            runs-on: ubuntu-24.04-arm
            target: lite
            langs: ""
          - name: bundle shell,go (ubuntu-24.04-arm)
            runs-on: ubuntu-24.04-arm
            target: bundle
            langs: "shell,go"
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    env:
      KAPI_VIM_LANGS: ${{ matrix.langs }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/install-nix
      - id: build
        run: echo "out=$(nix build --impure .#${{ matrix.target }} --print-build-logs --no-link --print-out-paths)" >> "$GITHUB_OUTPUT"
      - name: Put bin on PATH
        run: echo "${{ steps.build.outputs.out }}/bin" >> "$GITHUB_PATH"
      - name: Restore plugins
        run: nvim --headless "+Lazy! restore" +qa
      - name: Run smoke test
        run: nvim --headless -S .github/scripts/smoke-test.lua
      # Appended here rather than a separate workflow: this job already paid
      # for the nix build and lazy.nvim plugin restore above, so benchmarking
      # in place is just a few headless nvim invocations (seconds) instead of
      # duplicating that build+restore cost per platform. A full CI run is
      # only ~2-3 minutes wall clock with plenty of concurrency headroom
      # (public repo, at most 3 test-matrix jobs running at once), so there's
      # no runtime pressure pushing this out into its own workflow.
      - name: Benchmark startup time
        run: |
          {
            echo "### Startup time — ${{ matrix.name }}"
            echo '```'
            ./scripts/benchmark-startup 10
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
